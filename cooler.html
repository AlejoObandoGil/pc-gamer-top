<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Coolers CPU Calidad/Precio 2026</title>

    <style>

        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #06b6d4;
            --border-color: #e5e7eb;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1450px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 35px;
        }

        /* ========================== */
        /* PODIO */
        /* ========================== */

        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 45px;
        }

        .podium-card {
            background: white;
            border-radius: 14px;
            padding: 22px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            transition: .2s;
            border-top: 6px solid var(--border-color);
            flex: 1;
            min-width: 260px;
            max-width: 340px;
        }

        .podium-card:hover {
            transform: translateY(-6px);
        }

        .rank-1 {
            order: 2;
            min-height: 290px;
            border-top-color: var(--gold);
        }

        .rank-2 {
            order: 1;
            min-height: 250px;
            border-top-color: var(--silver);
        }

        .rank-3 {
            order: 3;
            min-height: 230px;
            border-top-color: var(--bronze);
        }

        .medal {
            font-size: 2.7rem;
            display: block;
            margin-bottom: 10px;
        }

        .cooler-name {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #111827;
        }

        .cooler-price {
            font-size: 1.35rem;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 12px;
        }

        .cooler-badge {
            display: inline-block;
            background: #cffafe;
            color: #155e75;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .cooler-highlight {
            color: #6b7280;
            font-style: italic;
            font-size: 0.95rem;
        }

        /* ========================== */
        /* TABLA */
        /* ========================== */

        .table-container {
            background: white;
            border-radius: 14px;
            overflow-x: auto;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #111827;
            color: white;
            padding: 16px;
            text-align: left;
            font-size: 0.95rem;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.92rem;
        }

        tr:hover {
            background: #f9fafb;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .text-center {
            text-align: center;
        }

        .price-col {
            font-weight: bold;
            color: var(--accent-color);
        }

    </style>

</head>
