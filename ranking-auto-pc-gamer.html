<script>

// ========================================
// BUILDS
// ========================================

const builds = [];

// ========================================
// AGREGAR BUILD
// ========================================

function addBuild(build){

  build.score = calculateScore(build);

  builds.push(build);

  builds.sort((a,b)=> b.score - a.score);

  renderTable();
}

// ========================================
// SCORE ENGINE
// ========================================

function calculateScore(build){

  let score = 0;

  // CPU

  if(build.cpu.includes("9600X")) score += 100;
  else if(build.cpu.includes("8700F")) score += 88;
  else if(build.cpu.includes("7600X")) score += 82;
  else if(build.cpu.includes("7500F")) score += 72;
  else if(build.cpu.includes("4800F")) score += 40;

  // GPU

  if(build.gpu.includes("5070")) score += 130;
  else if(build.gpu.includes("5060")) score += 95;
  else if(build.gpu.includes("9060")) score += 100;

  // Motherboard

  if(build.board.includes("X870")) score += 45;
  else if(build.board.includes("B850")) score += 38;
  else if(build.board.includes("B650")) score += 32;
  else if(build.board.includes("B840")) score += 22;
  else if(build.board.includes("A620")) score += 12;

  // RAM

  if(build.ram.includes("6000")) score += 18;
  else if(build.ram.includes("5600")) score += 10;

  if(build.ram.includes("G.Skill")) score += 8;
  if(build.ram.includes("XPG")) score += 6;
  if(build.ram.includes("Patriot")) score += 4;

  // SSD

  if(build.ssd.includes("1TB")) score += 18;
  else if(build.ssd.includes("512")) score += 8;
  else if(build.ssd.includes("480")) score += 5;

  // PSU

  if(build.psu.includes("Gold")) score += 25;
  else if(build.psu.includes("Bronze")) score += 12;

  if(build.psu.includes("Cooler Master")) score += 10;
  if(build.psu.includes("Corsair")) score += 10;
  if(build.psu.includes("AZZA")) score -= 2;

  // Cooling

  if(build.extras.toLowerCase().includes("líquida")) score += 12;
  if(build.extras.toLowerCase().includes("thermalright")) score += 8;

  // Case quality

  if(build.extras.includes("Cougar")) score += 5;
  if(build.extras.includes("Antec")) score += 6;

  // Price/value

  if(build.price <= 5300000) score += 25;
  else if(build.price <= 5800000) score += 18;
  else if(build.price <= 6200000) score += 10;

  return score;
}

// ========================================
// CATEGORY
// ========================================

function getCategory(score){

  if(score >= 320){
    return {
      text:"🔥 High-End Inteligente",
      class:"best"
    };
  }

  if(score >= 290){
    return {
      text:"👑 Premium",
      class:"premium"
    };
  }

  if(score >= 250){
    return {
      text:"🚀 Excelente",
      class:"future"
    };
  }

  return {
    text:"💰 Calidad/Precio",
    class:"value"
  };
}

// ========================================
// RENDER TABLE
// ========================================

function renderTable(){

  const tbody = document.getElementById("tbody");

  tbody.innerHTML = "";

  builds.forEach((build,index)=>{

    let medal = index + 1;

    if(index === 0) medal = "🥇";
    if(index === 1) medal = "🥈";
    if(index === 2) medal = "🥉";

    const category = getCategory(build.score);

    tbody.innerHTML += `
      <tr>

        <td class="rank">${medal}</td>

        <td>${build.cpu}</td>

        <td>${build.board}</td>

        <td>${build.gpu}</td>

        <td>${build.ram}</td>

        <td>${build.ssd}</td>

        <td>${build.psu}</td>

        <td>${build.extras}</td>

        <td class="price">
          $${build.price.toLocaleString("es-CO")}
        </td>

        <td class="score">
          ${build.score}
        </td>

        <td>
          <span class="tag ${category.class}">
            ${category.text}
          </span>
        </td>

        <td class="good">
          ${build.pros}
        </td>

        <td class="bad">
          ${build.cons}
        </td>

      </tr>
    `;
  });

}
